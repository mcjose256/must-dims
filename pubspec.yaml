name: dims
description: MUST Internship Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.3
  cupertino_icons: ^1.0.8
  cross_file: ^0.3.4+2
  file_picker: ^8.0.0+1
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  flutter_file_dialog: ^3.0.2
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.3
  flutter_riverpod: ^2.5.1
  flutter_screenutil: ^5.9.3
  flutter_spinkit: ^5.2.1
  freezed_annotation: ^2.4.4
  go_router: ^14.3.0
  google_fonts: ^6.2.1
  intl: 0.20.2
  json_annotation: ^4.9.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  shimmer: ^3.0.0
  url_launcher: ^6.2.5

dev_dependencies:
  build_runner: ^2.4.12
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.4.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/must logo.png"
  min_sdk_android: 21

  adaptive_icon_background: "#1E3A8A"

  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#1E3A8A"
    theme_color: "#F59E0B"

  remove_alpha_ios: true
